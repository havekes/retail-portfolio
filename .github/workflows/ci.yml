name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --dev

      - name: Type check
        run: |
          uv run ty check

      - name: Lint
        run: uv run ruff check && uv run ruff format --check

      - name: Test
        run: uv run pytest
        env:
          DATABASE_URL: "postgresql+asyncpg://test_user:test_password@localhost:5432/test_db"
          REDIS_URL: "redis://localhost:6379/0"

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Prepare env file
        run: cp frontend/.env.example frontend/.env

      - name: Run type checks
        run: |
          cd frontend
          npm run check

      - name: Run ESLint and Prettier checks
        run: |
          cd frontend
          npm run lint

      - name: Run Vitest
        run: |
          cd frontend
          npm run test:run
